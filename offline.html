<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2547" />
  <title>Offline — Daily Faith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2547;
      --gold: #c9a449;
      --gold-soft: #efe3c4;
      --parchment: #f5f2ec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--parchment);
      font-family: 'DM Sans', sans-serif;
      color: var(--navy);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 32px 24px;
    }
    .card {
      max-width: 360px;
      background: #fff;
      border-radius: 20px;
      padding: 48px 36px;
      box-shadow: 0 12px 32px rgba(26,37,71,0.12);
      border: 1px solid var(--gold-soft);
    }
    .icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--gold-soft);
      color: var(--gold);
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #6b6a63;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: var(--navy);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 14px 32px;
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background .2s ease;
    }
    a:hover { background: #2a3560; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✝️</div>
    <h1>You're Offline</h1>
    <p>No internet connection right now. Please check your connection and try again.</p>
    <a href="./">Try Again</a>
  </div>
</body>
</html>
